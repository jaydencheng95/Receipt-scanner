<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Receipts">
<title>Receipt Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');
  :root {
    --ink:#0f0f0f; --paper:#f7f6f3; --rule:#d8d6cf;
    --accent:#2563eb; --accent-light:#eff4ff;
    --success:#059669; --success-light:#ecfdf5;
    --danger:#dc2626; --warning:#d97706; --warning-light:#fffbeb;
    --mono:'IBM Plex Mono',monospace; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  header{width:100%;max-width:480px;padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;}
  .logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
  .badge{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:#666;border:1px solid var(--rule);padding:3px 8px;border-radius:2px;}
  main{width:100%;max-width:480px;padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:12px;}

  /* Setup */
  .setup-screen{display:flex;flex-direction:column;gap:20px;padding:24px 0 8px;}
  .setup-hero{text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .setup-icon{width:56px;height:56px;background:var(--accent-light);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--accent);}
  .setup-title{font-size:20px;font-weight:600;}
  .setup-sub{font-size:14px;color:#666;line-height:1.5;max-width:300px;}
  .setup-steps{background:white;border:1px solid var(--rule);border-radius:10px;overflow:hidden;}
  .setup-step{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-bottom:1px solid var(--rule);}
  .setup-step:last-child{border-bottom:none;}
  .step-num{width:22px;height:22px;background:var(--accent);color:white;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .step-text{font-size:13px;line-height:1.5;color:#444;}
  .step-text a{color:var(--accent);text-decoration:none;font-weight:500;}
  .step-text strong{color:var(--ink);}
  .key-input-wrap{display:flex;flex-direction:column;gap:8px;}
  .key-input-label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#888;}
  .key-input-row{display:flex;gap:8px;}
  .key-input{flex:1;padding:11px 12px;border:1.5px solid var(--rule);border-radius:8px;font-family:var(--mono);font-size:13px;color:var(--ink);background:white;}
  .key-input:focus{outline:none;border-color:var(--accent);}
  .key-input::placeholder{color:#bbb;}
  .key-save-btn{padding:11px 18px;background:var(--ink);color:white;border:none;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .key-save-btn:hover{opacity:.85;}
  .key-note{font-size:11px;color:#999;font-family:var(--mono);line-height:1.5;}

  /* App */
  .app-screen{display:none;flex-direction:column;gap:12px;}
  .app-screen.visible{display:flex;}
  .key-bar{display:flex;align-items:center;justify-content:space-between;background:white;border:1px solid var(--rule);border-radius:8px;padding:10px 14px;}
  .key-status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:#555;}
  .key-dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0;}
  .key-change{font-family:var(--mono);font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
  .key-change:hover{color:var(--danger);}

  /* Drive bar */
  .gdrive-bar{display:flex;align-items:center;justify-content:space-between;background:white;border:1px solid var(--rule);border-radius:8px;padding:10px 14px;gap:10px;}
  .gdrive-left{display:flex;flex-direction:column;gap:3px;}
  .gdrive-status{display:flex;align-items:center;gap:8px;font-size:12px;font-family:var(--mono);color:#555;}
  .gdrive-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .2s;}
  .gdrive-dot.connected{background:var(--success);}
  .folder-info{display:none;font-family:var(--mono);font-size:11px;color:var(--success);align-items:center;gap:4px;}
  .folder-info.visible{display:flex;}
  .gdrive-connect-btn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:white;background:var(--accent);border:none;border-radius:4px;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .gdrive-connect-btn:hover{opacity:.85;}
  .gdrive-connect-btn.grey{background:#9ca3af;}

  /* Upload buttons */
  .upload-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .upload-btn-card{border:1.5px dashed var(--rule);border-radius:10px;padding:22px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;background:white;text-align:center;}
  .upload-btn-card:hover{border-color:var(--accent);background:var(--accent-light);}
  .upload-btn-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-icon{width:48px;height:48px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);}
  .upload-icon.purple{background:#f3f0ff;color:#7c3aed;}
  .upload-btn-label{font-size:13px;font-weight:600;}
  .upload-btn-sub{font-size:11px;color:#888;font-family:var(--mono);}

  /* Preview */
  .preview-wrap{display:none;position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--rule);background:white;}
  .preview-wrap.visible{display:block;}
  .preview-wrap img{width:100%;max-height:260px;object-fit:contain;display:block;background:#f0ede8;}
  .preview-clear{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.55);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;}

  /* Scan btn */
  .scan-btn{width:100%;padding:14px;background:var(--ink);color:white;border:none;border-radius:8px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;display:none;align-items:center;justify-content:center;gap:8px;}
  .scan-btn:hover{opacity:.85;}
  .scan-btn.visible{display:flex;}
  .scan-btn:disabled{opacity:.5;cursor:not-allowed;}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
  .scan-btn.loading .spinner{display:block;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Result */
  .result-card{display:none;background:white;border:1px solid var(--rule);border-radius:8px;overflow:hidden;}
  .result-card.visible{display:block;}
  .result-header{padding:11px 16px;background:var(--success-light);border-bottom:1px solid #d1fae5;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--success);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}
  .field-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--rule);gap:12px;}
  .field-row:last-child{border-bottom:none;}
  .field-label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#888;width:72px;flex-shrink:0;}
  .field-edit{font-size:15px;border:1px solid var(--rule);border-radius:4px;padding:5px 9px;font-family:var(--mono);color:var(--ink);width:100%;background:var(--paper);}
  .field-edit:focus{outline:none;border-color:var(--accent);}

  /* Status */
  .upload-status{display:none;padding:10px 14px;border-radius:6px;font-family:var(--mono);font-size:12px;align-items:center;gap:8px;}
  .upload-status.visible{display:flex;}
  .upload-status.uploading{background:var(--warning-light);color:var(--warning);border:1px solid #fde68a;}
  .upload-status.done{background:var(--success-light);color:var(--success);border:1px solid #d1fae5;}
  .upload-status.fail{background:#fef2f2;color:var(--danger);border:1px solid #fecaca;}
  .mini-spinner{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}

  /* Error */
  .error-msg{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;font-size:13px;color:var(--danger);font-family:var(--mono);line-height:1.5;}
  .error-msg.visible{display:block;}

  /* Add btn */
  .add-btn{width:100%;padding:13px;background:var(--success);color:white;border:none;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:none;align-items:center;justify-content:center;gap:6px;}
  .add-btn:hover{opacity:.88;}
  .add-btn.visible{display:flex;}
  .add-btn:disabled{opacity:.5;cursor:not-allowed;}

  /* Log */
  .log-section{display:none;flex-direction:column;gap:10px;}
  .log-section.visible{display:flex;}
  .log-heading{display:flex;justify-content:space-between;align-items:center;}
  .log-title{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#888;}
  .export-btn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:none;border:1px solid var(--accent);border-radius:4px;padding:4px 10px;cursor:pointer;}
  .export-btn:hover{background:var(--accent);color:white;}
  .log-table{width:100%;border-collapse:collapse;background:white;border:1px solid var(--rule);border-radius:8px;overflow:hidden;}
  .log-table th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#888;padding:9px 12px;text-align:left;border-bottom:1px solid var(--rule);background:var(--paper);}
  .log-table td{padding:9px 12px;border-bottom:1px solid var(--rule);font-family:var(--mono);font-size:12px;vertical-align:middle;}
  .log-table tr:last-child td{border-bottom:none;}
  .log-table td.amount{font-weight:600;}

      var parsed;
      try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }

      fieldDate.value     = toMMDDYY(parsed.date) || '';
      fieldAmount.value   = parsed.amount != null ? ((parsed.currency || '') + ' ' + parsed.amount).trim() : '';
      fieldMerchant.value = parsed.merchant || '';

      resultCard.classList.add('visible');
      addBtn.classList.add('visible');

    .catch(function(err) {
      errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
      errorMsg.classList.add('visible');

  });

  function setLoading(on) {
    scanBtn.disabled = on;
    scanBtn.querySelector('.btn-text').textContent = on ? 'Scanning…' : 'Extract Date & Amount';
    scanBtn.querySelector('.spinner').style.display = on ? 'block' : 'none';
  }

  // ── SAVE + LOG ────────────────────────────────────────────────────────────
  addBtn.addEventListener('click', function() {
    var date     = fieldDate.value.trim()     || '—';
    var amount   = fieldAmount.value.trim()   || '—';
    var merchant = fieldMerchant.value.trim() || '—';
    addBtn.disabled = true;

    function finish(driveLink) {
      expenses.push({ date: date, merchant: merchant, amount: amount, driveLink: driveLink || null });
      renderLog();
      logSection.classList.add('visible');
      addBtn.disabled = false;
      resetForm();
    }

    if (accessToken && currentFile) {
      showDriveStatus('uploading', 'Saving to Google Drive…');
      var safeName = merchant.replace(/[^a-z0-9]/gi, '_');
      var safeDate = date.replace(/\//g, '-');
      var ext = (currentFile.name.match(/\.[^.]+$/) || ['.jpg'])[0].toLowerCase();
      uploadReceiptImage(currentFile, 'receipt_' + safeDate + '_' + safeName + ext)
        .then(function(f) {
          showDriveStatus('done', '✓ Saved to Google Drive → ' + FOLDER_NAME + '/');
          finish(f.webViewLink);
        })
        .catch(function(err) {
          showDriveStatus('fail', 'Drive upload failed: ' + err.message);
          finish(null);
        });
    } else {
      finish(null);
    }
  });

  function showDriveStatus(type, msg) {
    uploadStatus.className = 'upload-status visible ' + type;
    statusSpinner.style.display = type === 'uploading' ? 'block' : 'none';
    statusText.textContent = msg;
  }

  function renderLog() {
    logBody.innerHTML = '';
    logCount.textContent = expenses.length;
    expenses.forEach(function(e, i) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + e.date + '</td>' +
        '<td>' + e.merchant + '</td>' +
        '<td class="amount">' + e.amount + '</td>' +
        '<td>' + (e.driveLink
          ? '<a class="drive-link" href="' + e.driveLink + '" target="_blank">View</a>'
          : '<span style="color:#ccc;font-size:11px">—</span>') + '</td>' +
        '<td><button class="del-row" data-i="' + i + '">×</button></td>';
      logBody.appendChild(tr);
    });
    logBody.querySelectorAll('.del-row').forEach(function(btn) {
      btn.addEventListener('click', function() {
        expenses.splice(+btn.dataset.i, 1);
        renderLog();
        if (!expenses.length) logSection.classList.remove('visible');
      });
    });
  }

  exportBtn.addEventListener('click', function() {
    var rows = expenses.map(function(e) {
      return '"' + e.date + '","' + e.merchant + '","' + e.amount + '","' + (e.driveLink || '') + '"';
    }).join('\n');
    var blob = new Blob(['Date,Merchant,Amount,Drive Link\n' + rows], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'coupa-expenses-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  });

}); // end DOMContentLoaded
</script>
</body>
</html>
